# # rather than hardcoded at compile time.
# #
# # Scope: every project kind except the virtual workspace root. This
# # covers both workspace members audited via --recursive/--package and
# # standalone single-crate projects (which are conceptually one-feature
# # applications and equally subject to the configurability rule).

# [[rules]]
# id = 151
# category = "structure"
# description = "Feature crate must have config/application.toml for runtime configuration"
# severity = "warning"
# type = "file_exists"
# remediation_strategy = "declarative"
# path = "config/application.toml"
# skip_project_layout = ["workspace", "project"]
# skip_application_type = ["shell_binary", "shell_lib", "gateway"]
# scope = ["package"]
# subcategory = "config"

# [rules.remediation]
# action = "create_file"
# path = "config/application.toml"
# content = "# Application configuration.\n# Forces the feature to be runtime-configurable — add keys here\n# rather than hardcoding values in source.\n\n[application]\nname = \"\"\nversion = \"0.1.0\"\n"
# is_safe = true
# description = "Create config/application.toml with minimum [application] table"

# llm_prompt = """
# 1. Every feature crate in an SEA workspace must provide its own runtime configuration via `config/application.toml`. This forces features to be configurable rather than hardcoded.
# 2. Create the file `config/application.toml` in the crate root. Minimum content:

#    [application]
#    name = "<feature-name>"
#    version = "0.1.0"

# 3. Add crate-specific keys (timeouts, feature flags, external endpoints, retry policy, logging level, etc.) under additional tables as the feature grows.
# 4. Load the config at startup via `toml` + `serde` — do not hardcode values that could reasonably vary between environments or deployments.
# 5. For libraries, the config is consumed by the binary that links them; for gateways, by the adapter's runtime; for binaries and shells, by `main()` at startup.
# """

# # =============================================================================
# # §16: service_type (Checks 152-155) — Service Type Enforcement
# # =============================================================================
# # Every feature crate must declare its service_type in
# # [package.metadata.struct-engine]. The service_type determines which
# # primary trait the crate's api/traits.rs must expose and what contract
# # the core/ layer must implement.
# #
# # Service Types:
# #   - generator:     Input schema → output artifacts.  Primary trait: Generator
# #   - compiler:      Source → compiled output.          Primary trait: Compiler
# #   - validator:     Input → diagnostic list.           Primary trait: Validator
# #   - processor:     Transform input → output.          Primary trait: Processor
# #   - importer:      External format → internal schema. Primary trait: Importer
# #   - exporter:      Internal schema → external format. Primary trait: Exporter
# #   - manager:       Lifecycle/state coordination.      Primary trait: Manager
# #   - registry:      Store + lookup entries by key.     Primary trait: Registry
# #   - resolver:      Query → concrete value.            Primary trait: Resolver
# #   - provider:      Supply data/config on demand.      Primary trait: Provider
# #   - inspector:     Read/analyze without modifying.    Primary trait: Inspector
# #   - monitor:       Observe + report system state.     Primary trait: Monitor
# #   - tester:        Schema + runtime → assertions.     Primary trait: (domain-specific)
# #   - schema:        Canonical type system (multi-role). Primary trait: Generator
# #   - orchestrator:  CLI binary wiring all services.    No primary trait required.
# #
# # Trait names must be nouns (is-a test): "A CssGenerator is-a Generator."
# # Impl structs follow Default* prefix: DefaultValidator, DefaultGenerator.

# [[rules]]
# id = 152
# category = "service_type"
# description = "service_type must be defined in project metadata"
# severity = "error"
# type = "builtin"
# handler = "service_type_defined"
# remediation_strategy = "manual"
# fix_hint = "Add service_type = \"generator|compiler|validator|processor|importer|exporter|manager|registry|resolver|provider|inspector|monitor|tester|schema|orchestrator\" to [package.metadata.struct-engine]"
# skip_project_layout = "workspace"
# scope = ["package"]
# subcategory = "manifest"

# [rules.remediation]
# action = "manual"
# instruction = "Add `service_type = \"<type>\"` to the existing [package.metadata.struct-engine] section in Cargo.toml. Choose the type that matches the crate's primary responsibility."
# is_safe = true
# description = "Add service_type metadata to Cargo.toml"

# llm_prompt = """
# 1. Open the project's Cargo.toml and find the [package.metadata.struct-engine] section.
# 2. Add `service_type = "<type>"` where type is one of:
#    - "generator" — crate transforms a schema/spec into output artifacts (code, config, etc.)
#    - "compiler" — crate compiles a source representation into a target format
#    - "validator" — crate checks input and returns a list of diagnostics/violations
#    - "processor" — crate transforms input data through a pipeline into output data
#    - "importer" — crate reads an external format and produces internal schema/types
#    - "exporter" — crate reads internal schema and writes an external format
#    - "manager" — crate coordinates lifecycle or state of resources (connections, sessions)
#    - "registry" — crate stores and looks up entries by key (components, plugins, services)
#    - "resolver" — crate takes a query/reference and resolves it to a concrete value
#    - "provider" — crate supplies data, config, or services on demand
#    - "inspector" — crate reads and analyzes input without modifying it
#    - "monitor" — crate observes and reports on system state (health, metrics)
#    - "tester" — crate runs assertions against a schema + runtime environment
#    - "schema" — crate defines the canonical type system (may have multiple roles)
#    - "orchestrator" — CLI binary that wires all service crates together
# 3. The service_type should describe WHAT the crate IS, not what it does in a specific context.
# 4. Run `cargo check` to verify the metadata is valid TOML.
# """

