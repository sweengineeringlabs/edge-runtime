# include_str! compiles the file content into the binary at build time.
# When used as the *only* source of a config or policy file, it becomes
# impossible to change the behaviour without recompiling and reinstalling.

# The correct pattern is embed-as-fallback:

# ```rust
# // Compile-time snapshot — used when no project-local file is found.
# const EMBEDDED: &str = include_str!(\"../policy/rules.toml\");

# pub fn load_config() -> SeaConfig {
#     if let Some(path) = locate_config_file() {
#         if let Ok(text) = std::fs::read_to_string(&path) {
#             if let Ok(cfg) = parse(&text) {
#                 return cfg; // project-local wins
#             }
#         }
#     }
#     parse(EMBEDDED).expect(\"embedded config must parse\")
# }
# ```

# Acceptable static embeds (no override needed):
# - Scaffold templates  (templates/*.toml)
# - Test fixtures       (fixtures/*.toml)
# - Schema snapshots    (snapshots/*.json)

# Everything else that users are expected to edit needs a runtime override.
# """


