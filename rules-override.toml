# [[rules]]
# id = 156
# category = "workspace"
# description = "Workspace member paths and crate names must not contain duplicate segments (design smell)"
# severity = "warning"
# type = "builtin"
# handler = "workspace_no_duplicate_segments"
# remediation_strategy = "manual"
# project_layout = "workspace"
# scope = ["workspace"]
# subcategory = "identity"
# fix_hint = "Collapse the redundant directory or name segment. A duplicate is almost always a forced split or padding — see docs/conventions/crate-naming.md."

# [rules.remediation]
# action = "manual"
# instruction = "Trace the duplicate to its structural cause. If the inner segment doesn't carry a real distinction, collapse it (move the inner crate up one directory and adjust [workspace] members + dep declarations). If two distinct layers genuinely share a label, rename whichever is more specific."
# is_safe = false
# description = "Collapse duplicate path/name segments or rename to disambiguate"

# llm_prompt = """
# 1. Identify the duplicate segment — either in the workspace member path
#    (e.g. `main/features/controlroom/controlroom/`) or in the package name
#    (e.g. `controlroom_controlroom`, `swe_observ_observ_context`).
# 2. Decide whether the inner segment carries a real layer:
#    - Forced split (no distinction) → collapse: move the inner crate up
#      one directory level and rename it back to the parent name.
#    - Two real layers sharing a label → rename whichever is more specific
#      (typically the inner one) — e.g. `gateway/contract` and
#      `gateway/runtime` instead of `gateway/gateway`.
# 3. Update `[package] name` in the affected Cargo.toml.
# 4. Update `[workspace] members` and any path-based dep declarations.
# 5. `grep -rn '<old-name>'` for module imports / docs that need updating.
# 6. Run `cargo check --workspace` to confirm.
# """

# [[rules]]
# id = 166
# category = "workspace"
# description = "Every crate directory with a Cargo.toml under the workspace root must be listed in [workspace].members"
# severity = "error"
# type = "builtin"
# handler = "workspace_members_all_registered"
# remediation_strategy = "declarative"
# project_layout = "workspace"
# scope = ["workspace"]
# subcategory = "membership"

# [rules.remediation]
# action = "manual"
# instruction = "For each unlisted crate directory: either add its path to [workspace].members in the workspace Cargo.toml, or delete the orphan crate directory."
# is_safe = false
# description = "Register every on-disk crate in [workspace].members"

# llm_prompt = """
# A directory under the workspace root contains a Cargo.toml but is not
# listed in the workspace's [workspace].members. The workspace manifest
# is the source of truth for Cargo's build graph — unlisted crates don't
# participate in `cargo build`, `cargo test`, or dependency resolution.
# That is almost always a mistake (a crate copied or renamed without
# updating members) rather than a deliberate choice.

# For each violation:
# 1. Decide whether the orphan crate should be part of the workspace.
# 2. If YES: add its path (relative to the workspace root, forward slashes)
#    to [workspace].members — e.g. `"features/<name>"`.
# 3. If NO: delete the orphan crate directory.
# 4. Run `cargo check --workspace` followed by
#    `swe struct audit . --rs --checks 63,166` to verify both sides of
#    the bijection.
# """

