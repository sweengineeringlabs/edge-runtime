# # ---------------------------------------------------------------------------
# # §14: weak filesystem (Check 150) — Cross-host path portability
# # ---------------------------------------------------------------------------
# # Detection-layer scan for the "weak filesystem" bug class: code that
# # builds or normalises paths in ways whose output depends on the build
# # host's MAIN_SEPARATOR. These patterns are wrong on any modern Rust
# # project — host-I/O code using them breaks on WSL, Docker, or cross-
# # compile; emission code using them breaks cross-host byte-equivalence.
# #
# # Patterns detected (see docs/3-design/guides/posix-paths-in-emissions.md
# # §Detection for rationale):
# #   1. std::path::MAIN_SEPARATOR referenced in source.
# #   2. format!/write! format strings with a hardcoded \\ separator.
# #   3. Post-hoc .replace('\\', "/") or .replace("\\", "/") on paths.
# #   4. PathBuf::from / Path::new with a string literal containing \\.
# #
# # Severity = warning: legitimate rare uses exist (Windows-specific
# # install scripts, UNC path handling). Reviewer judgement, not error.

# [[rules]]
# id = 150
# category = "hygiene"
# description = "Weak filesystem patterns — code that produces host-dependent paths (MAIN_SEPARATOR, hardcoded \\\\, replace-hacks, literal backslashes)"
# severity = "warning"
# type = "glob_content_not_matches"
# remediation_strategy = "manual"
# glob = "src/**/*.rs"
# scope = ["package"]
# subcategory = "filesystem"
# pattern = '''\bMAIN_SEPARATOR\b|format!\([^)]*\\{2}[^)]*\)|write!\([^)]*\\{2}[^)]*\)|(?:Path|PathBuf)::(?:new|from)\s*\(\s*["'][^"']*\\{2}[^"']*["']|\.replace\s*\(\s*['"]\\\\['"]'''
# fix_hint = "Builds host-dependent paths. Use std::path::Path::join for host I/O, or PosixPath (forward-slash-only) for values emitted into artifacts. See docs/3-design/guides/posix-paths-in-emissions.md §Detection."
# exclude_pattern = '''(?:^\s*//|^\s*#\[doc|^\s*#!\[doc|MAIN_SEPARATOR_STR|audit:allow-weak-fs)'''

# [rules.remediation]
# action = "manual"
# instruction = "Replace host-separator-dependent path construction. For host filesystem I/O, use Path::join and PathBuf::push — they pick the correct separator per host. For paths that flow into emitted artifacts (source maps, module specifiers, cache keys), use PosixPath so output is byte-identical across build hosts."
# is_safe = false
# description = "Replace weak-filesystem pattern with Path::join (host I/O) or PosixPath (emissions)"

# llm_prompt = """
# 1. Identify which class the flagged code belongs to:
#    - Host filesystem I/O (reading/writing files on disk) → should use Path::join / PathBuf::push. Never build paths by string concatenation.
#    - Emitted into an artifact (source map, import rewriter, cache key, report JSON) → should use PosixPath (see docs/3-design/guides/posix-paths-in-emissions.md for the pattern).
# 2. For host I/O, replace:
#    - `format!("{}{}{}", a, MAIN_SEPARATOR, b)` → `Path::new(a).join(b)`
#    - `format!("{}\\\\{}", a, b)` → `Path::new(a).join(b)`
#    - `path.replace("\\\\", "/")` → don't normalise; build the path correctly upstream with Path::join
#    - `PathBuf::from("foo\\\\bar")` → `Path::new("foo").join("bar")` (or keep as-is only if the hardcoded segment names are invariant and fine for the target host)
# 3. For emission paths, replace with the appropriate PosixPath constructor.
# 4. If the hit is a false positive (e.g., deliberately generating a Windows install script), add the comment marker `// audit:allow-weak-fs` on the same line. The rule's exclude_pattern will skip it.
# """

# # ---------------------------------------------------------------------------
