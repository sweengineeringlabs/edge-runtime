# [[rules]]
# id = 159
# category = "interface"
# description = "saf/ public function signatures must not name types from core/ (signature leak)"
# severity = "warning"
# type = "builtin"
# handler = "saf_signature_no_core_types"
# remediation_strategy = "manual"
# skip_application_type = ["gateway"]
# layer = ["saf", "core"]
# scope = ["package"]
# subcategory = "signatures"
# fix_hint = "Either move the leaked type to api/ (if it is part of the public contract), or change the signature to return `impl Trait` from api/ or a saf-owned wrapper struct. saf/ must not name core types in public signatures."

# [rules.remediation]
# action = "manual"
# instruction = "Open the flagged saf/ function and decide: (a) if the leaked core type is really part of the public contract, move it to api/ where it can stay `pub`; (b) if it's implementation detail, change the signature to return `impl Trait` for a trait defined in api/, or wrap the core value in a saf-owned struct whose public surface hides the core type."
# is_safe = false
# description = "Replace the core type reference in saf/'s signature with an api/ type, impl Trait, or saf wrapper"

# llm_prompt = """
# Rule 47 blocks `pub use crate::core::...` in saf/. Rule 159 blocks the same
# thing via a different channel: a saf/ public function whose return type or
# parameter type names a core type. Both leak implementation to consumers.

# 1. Read the violation — it names the saf/ file, the `pub fn`, and the leaked
#    type.
# 2. Identify what the function is actually producing or consuming. Options:
#    (a) Type IS public contract — move it to src/api/<module>.rs (it can stay
#        `pub` there legitimately, no more core/ scope issue, rule 50 satisfied).
#        Then saf re-exports the type from api/, not from core/.
#    (b) Type IS implementation — replace the signature's reference with
#        either `impl SomeTrait` where SomeTrait is defined in api/, or a
#        saf-owned wrapper struct that delegates to the core type internally.
# 3. Verify with `cargo check` that no downstream consumer was relying on the
#    leaked identity. If any does, migrate those call sites onto the api/ type
#    or the trait abstraction.
# 4. Re-run `swe struct audit . --rs --checks 47,50,159` — all three should
#    pass once the saf/ no longer names core types anywhere.
# """

# [[rules]]
# id = 160
# category = "interface"
# description = "All public types (struct, enum, trait, type alias) must be declared under api/ — no other layer is a legal declaration site"
# severity = "warning"
# type = "builtin"
# handler = "pub_types_in_api_only"
# application_type = ["lib", "binary", "shell_lib", "web"]
# remediation_strategy = "manual"
# layer = ["api", "saf", "spi", "gateway"]
# principles = ["single_source_of_truth", "encapsulation", "separation_of_concerns"]
# scope = ["package"]
# subcategory = "declaration"
# fix_hint = "Move the declaration to src/api/. api/ is the single source of truth for public types. saf/, spi/, and gateway/ compose — they do not declare new public types. spi/ extends api/ via traits but does not introduce new public types of its own."

# [rules.remediation]
# action = "manual"
# instruction = "Open the flagged file and move the `pub struct|enum|trait|type` declaration into `src/api/` (place it in an existing module, or create a new module that mirrors the feature). saf/, spi/, and gateway/ must not declare public types. Update imports across the crate (`use crate::api::<module>::<Type>`). Run `cargo check` to verify."
# is_safe = false
# description = "Move the declaration into src/api/ where public types live"

# llm_prompt = """
# api/ is the single source of truth for the crate's public contract. Every
# other SEA layer has a specific role that excludes declaring public types:

#   - core/    — implementation; items must be pub(crate) (rule 50).
#   - saf/     — composes/wraps; re-exports from api/, does not declare new
#                public types. Rule 47 blocks pub use from core; rule 159
#                blocks core types in public signatures; rule 160 blocks the
#                root cause — pub type declarations in saf/ at all.
#   - spi/     — extends api/ via traits and plugin points. Types the spi/
#                surface references must be declared in api/. spi/ does not
#                introduce new public types of its own.
#   - gateway/ — outermost adapter; composes api/core/saf of the host crate
#                and exposes a thin facade. Does not declare new public types.
#   - src/     — the crate root (lib.rs, types.rs, etc.) is not a legal
#                declaration site for public types. Module declarations and
#                re-exports belong here; type definitions belong in api/.

# To fix — TWO legitimate paths (see the violation's `fix_options` field for
# structured alternatives with `when_appropriate` discriminators):

# Option A: `move_to_api` — type IS public contract
#   When appropriate: consumers name, construct, or store instances of the type.
#   Example: `pub enum BackoffStrategy` — consumers write
#            `BackoffStrategy::Exponential { base, jitter }` to configure retry.
#   Steps:
#     1. Move the declaration to the target path in `fix_options[move_to_api].target`
#        (typically `src/api/<snake_case>.rs`, one pub item per file per rule 161).
#     2. Add `pub mod <new_module>;` to `src/api/mod.rs`.
#     3. Update imports across the crate: replace `use crate::saf::X` /
#        `use crate::<wherever>::X` with `use crate::api::<module>::X`.
#     4. If saf/ re-exports the type, update to `pub use crate::api::<module>::X`
#        (this is allowed — rule 47 blocks `pub use crate::core`, not api).
#   Safety: not safe to auto-apply (requires grep+update of import sites).

# Option B: `downgrade_visibility` — type IS implementation detail
#   When appropriate: the `pub` was accidental; nothing outside the crate
#                     references the type by name.
#   Example: an internal state struct that happens to be pub because no one
#            tightened the visibility. `pub(crate)` is the honest vocabulary.
#   Steps:
#     1. Change `pub <kind> <Name>` to `pub(crate) <kind> <Name>` in place.
#     2. Run `cargo check`. If any downstream site breaks, the type was not
#        actually implementation detail — revert and go with Option A instead.
#   Safety: safe to auto-apply IF `cargo check` passes afterward.

# Decision procedure:
#   - Grep the crate (and downstream dependents) for the type name.
#   - If references exist OUTSIDE this crate → Option A.
#   - If references exist only INSIDE this crate → Option B.
#   - If there are NO references anywhere → consider deleting the type.
# """

# [[rules]]
# id = 161
# category = "naming"
# description = "Each pub type/trait in api/ must be in its own standalone file with the file stem matching the snake_case name"
# severity = "warning"
# type = "builtin"
# handler = "api_filename_matches_type"
# application_type = ["lib", "binary", "shell_lib", "web"]
# remediation_strategy = "imperative"
# layer = ["api"]
# principles = ["screaming_architecture", "locality_of_reference"]
# fix_hint = "Each pub type/trait/enum/type-alias declared under api/ must live in its own .rs file whose stem matches the snake_case form of the type's name. E.g. `pub trait DatabaseGateway` belongs in `api/database_gateway.rs`. mod.rs and traits.rs (legacy collection) are exempt from the multi-item rule, but new code should prefer one item per file."
# scope = ["package"]
# subcategory = "filename"

# # Imperative fix: for single-item stem mismatches, the remediator renames the
# # file on disk and updates the parent mod.rs declaration. It does NOT update
# # `use` paths across the crate (that is multi-file refactoring beyond the
# # remediator's current scope) — the result includes a NOTICE for the user to
# # grep and update imports manually. Multi-item violations remain manual.
