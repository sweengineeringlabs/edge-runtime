# [rules.remediation]
# action = "manual"
# instruction = "For each offending test function in tests/<file>.rs, rename it to follow the pattern <feature>_<type_kind>_<fn>_<suffix> where feature is the crate name tail (e.g. 'review' from 'swe-architect-review'), type_kind is one of struct/trait/type/enum, fn is the function or module being tested, and suffix matches the file's test category (_test, _int_test, _e2e_test)."
# is_safe = false
