# struct-engine rules: Standard Rust project conventions
# 151 active checks across 17 categories (§1–§17)
# Run `swe guide rules` for a live breakdown; the count and category list
# are derived dynamically from this file at CLI runtime.
#
# =============================================================================
# Field semantics (full reference: rs.rules.schema.md)
# =============================================================================
#
# Each [[rules]] entry has a numeric `id`, a `category`, a `description`, a
# `severity` (error | warning | info), and a `type` (file_exists, dir_exists,
# file_content_matches, glob_content_matches, builtin, ...). Optional filter
# fields control when the rule fires.
#
# project_layout (root shape — one of: library | binary | hybrid | workspace | project)
# -----------------------------------------------------------------------------
#   Variant     Root marker                         Meaning
#   library     Cargo.toml with [lib] only          Library crate
#   binary      Cargo.toml with [[bin]] only        Binary crate
#   hybrid      Cargo.toml with both [lib] + [[bin]]  Single crate, both targets
#   workspace   Cargo.toml with [workspace], no [package]  Virtual workspace root (L1)
#   project     main/config/architecture.toml [project], NO Cargo.toml       swelabs project root (L0)
#
#   Containment:
#     Hybrid ⊇ Library      Hybrid ⊇ Binary
#     Hybrid ⊥ Workspace    Library ⊥ Binary    Workspace ⊥ Library/Binary
#     Project ⊥ {Library, Binary, Hybrid, Workspace}
#
#   Dispatch (let D = detected layout, X = rule's project_layout, S = skip_project_layout):
#     fires(R, D)  ⟺  (X is unset ∨ X = D) ∧ (S is empty ∨ D ∉ S)
#
#   The match is strict equality. A rule with project_layout = "library" does
#   NOT fire on a hybrid project despite Hybrid ⊇ Library — omit the field
#   if you want both. A rule with project_layout = "workspace" only fires on
#   the workspace root. A rule with project_layout = "project" only fires at
#   L0 (main/config/architecture.toml [project] with no Cargo.toml).
#
#   skip_project_layout accepts either a bare string (single skip) or an
#   array (multi-skip). Cargo-scoped rules that must skip both workspace
#   and project roots use: skip_project_layout = ["workspace", "project"].
#
# application_type (SEA architectural role — one per crate)
# -----------------------------------------------------------------------------
#   Variants: lib | binary | gateway | shell_binary | shell_lib | web
#
#   project_layout and application_type sit on different axes:
#     - project_layout describes the manifest shape (Cargo concept)
#     - application_type describes the crate's role within SEA
#   A workspace root has a project_layout (= workspace) but no application_type
#   — it isn't a crate. Members each have their own application_type.
#
#   Dispatch (let A = rule's application_type set, a = detected application_type):
#     fires(R, a)  ⟺  A is unset ∨ a ∈ A
#
# layer (SEA layer scope — array of: api | core | saf | spi | gateway)
# -----------------------------------------------------------------------------
#   Restricts a rule to specific SEA layers. The allowed import order is a DAG:
#     api ≺ core ≺ {saf, spi} ≺ gateway
#   Layer-boundary rules (e.g. 114) encode the forbidden edges:
#     api ↛ core, saf, spi, gateway
#     core ↛ saf, spi, gateway
#     saf  ↛ spi, gateway
#     spi  ↛ saf, gateway
#
# depends_on (rule prerequisites — array of rule IDs)
# -----------------------------------------------------------------------------
#   A rule is skipped if any dependency failed:
#     fires(R)  ⟺  ∀ d ∈ depends_on(R): result(d) = Pass
#   Prevents cascading false positives — e.g. rule 50 depends on rule 47 so
#   it won't propose a fix that would break compilation if 47 is failing.
#
# remediation_strategy (declarative | imperative | manual)
# -----------------------------------------------------------------------------
#   declarative — template-based: create/append files via [rules.remediation]
#   imperative  — compiled handler: the engine's remediator applies a code-level fix
#   manual      — human-only: too complex for automation
#
# Whitelist composition (for hierarchical whitelists below)
# -----------------------------------------------------------------------------
#   At each level ℓ, the effective whitelist is:
#     W(ℓ) = (base(ℓ) ∪ allow(ℓ)) \ reject(ℓ)
#   `reject` wins over `allow`.
#
# =============================================================================

# =============================================================================
# Path Configuration
# =============================================================================
# Define variables for path interpolation in rule paths.
# Use {var_name} in path fields to reference these variables.
# Escape with {{ and }} for literal braces.

[config]
source_dir = "src"
lib_entry = "lib.rs"
bin_entry = "main.rs"
test_dir = "tests"
docs_dir = "docs"
workspace_layout = "main/features"

# Gateway I/O module naming conventions
gateway_ingress_module = "ingress"
gateway_egress_module = "egress"

# Valid test file suffixes (category-based naming)
test_suffixes = [
    "_test.rs",             # Unit/module tests
    "_int_test.rs",         # Integration tests
    "_integration_test.rs", # Integration tests (alt)
    "_e2e_test.rs",         # End-to-end tests
    "_stress_test.rs",      # Stress tests
    "_perf_test.rs",        # Performance tests
    "_load_test.rs",        # Load tests
    "_security_test.rs",    # Security tests
    "_caching_test.rs",     # Caching tests
]

# Minimum percentage of source files that must have corresponding test files
structural_coverage_threshold = 80

# SEA layer levels: maps level keys to label(s).
# L1 = contract layer (traits, types, errors)
# L2 = implementation peers (internal + external, both depend on L1 only)
# L3 = facade / composition root (wires L2 impls)
# L4 = gateway (outermost interceptor, depends on L3)
[config.sea_levels]
L1 = "api"
L2 = ["core", "spi"]
L3 = "saf"
L4 = "gateway"

# Valid service types for [package.metadata.struct-engine] service_type
service_types = [
    "generator", "compiler", "validator", "processor",
    "importer", "exporter", "tester", "schema", "orchestrator",
    "manager", "registry", "resolver", "provider",
    "inspector", "monitor", "scanner",
]

# Map: service_type → required primary trait name in api/traits.rs
[config.service_type_traits]
generator   = "Generator"
compiler    = "Compiler"
validator   = "Validator"
processor   = "Processor"
importer    = "Importer"
exporter    = "Exporter"
schema      = "Generator"
manager     = "Manager"
registry    = "Registry"
resolver    = "Resolver"
provider    = "Provider"
inspector   = "Inspector"
monitor     = "Monitor"
scanner     = "SecurityScanner"

# Companion type suffixes for naming cohesion checks
companion_suffixes = [
    "Builder", "Error", "Result", "Config", "Options", "Settings",
    "Kind", "Type", "State", "Mode", "Status", "Info", "Data",
    "Context", "Handle", "Ref", "Entry", "Item", "Spec", "Params",
    "Event", "Command", "Query", "Response", "Request",
]

# Builder pattern suggestion thresholds (rule 91)
builder_field_threshold = 5   # Suggest Builder if struct has >= 5 fields
builder_option_threshold = 3  # Suggest Builder if struct has >= 3 Option<T> fields

# Mock libraries allowed in integration tests (external API stubs)
allowed_integration_mocks = ["wiremock"]

# ---------------------------------------------------------------------------
# Hierarchical whitelist — level-specific entry validation
# ---------------------------------------------------------------------------

# Level 0: Project root whitelist
[config.whitelist.project]
entries = [
    "main",
    "docs",
    "README.md", "CONTRIBUTING.md", "LICENSE", "SECURITY.md",
    ".git", ".gitignore", ".gitattributes",
    ".github",
    ".cargo",
    "CLAUDE.md",
    "bootstrap.sh", "bootstrap.ps1",
    "build.sh", "build.ps1",
    "deny.toml",
    ".idea", ".vscode",
    ".claude",
]

# Level 1: Workspace root whitelist (inside main/)
[config.whitelist.workspace]
entries = [
    "Cargo.toml", "Cargo.lock",
    "README.md", "CHANGELOG.md",
    "CONTRIBUTING.md", "LICENSE", "SECURITY.md",
    "CLAUDE.md", "GEMINI.md",
    "features",
    "config",
    "scripts",
    "agents",
    "docs",
    "templates",
    "target",
    "test", "examples", "benches",
    "bootstrap.sh", "bootstrap.ps1",
    "build.sh", "build.ps1",
    ".git", ".gitignore", ".gitattributes",
    ".github",
    ".cargo",
    "architecture.toml",
    "deny.toml",
    "xtask",
    ".idea", ".vscode",
    ".claude",
]

# Level 2: Feature crate whitelist (inside features/<name>/)
[config.whitelist.feature]
entries = [
    "Cargo.toml",
    "src", "tests", "docs", "examples", "benches",
    "build.rs", "migrations",
    "README.md", "CHANGELOG.md", "SECURITY.md",
    ".gitignore",
    "bootstrap.sh", "bootstrap.ps1",
    "build.sh", "build.ps1",
    "config",
    "templates",
    "target",
    "deny.toml",
    "scripts",
    "bin",
]

