# # =============================================================================
# # §7: interface (Checks 46-61) — Code to the Interface (SEA)
# #
# # Enforces Stratified Encapsulation Architecture (SEA) layer boundaries:
# #   L1 API   — public traits and types only (no imports from other layers)
# #   L2 Core  — pub(crate) internal implementations (depends on api/ only)
# #   L2 SPI   — pub(crate) external implementations (depends on api/ only; peer to core/)
# #   L3 SAF   — wraps trait methods as standalone functions; constructs core/ and spi/ impls
# #   L4 Gateway — outermost layer; intercepts consumer calls, delegates to saf/
# #
# # Reference: docs/3-design/architecture.md §SEA Layers
# # =============================================================================

# [[rules]]
# id = 46
# category = "interface"
# description = "api/ layer must not import from core/ (L2 must not depend on L3)"
# severity = "error"
# type = "glob_content_not_matches"
# remediation_strategy = "manual"
# glob = "src/api/**/*.rs"
# pattern = "^\\s*use crate::core"
# fix_hint = "Remove any core:: import from api/; define abstractions in api/traits.rs and inject via trait objects"
# layer = ["api", "core"]
# scope = ["package"]
# subcategory = "boundary"

# [rules.remediation]
# action = "manual"
# instruction = "Remove all use crate::{implementation_layer}:: imports from {source_dir}/{interface_layer}/ files. Define abstractions in {interface_layer}/traits.rs and inject via trait objects."
# is_safe = false
# description = "Remove forbidden {implementation_layer} imports from {interface_layer} layer"

# llm_prompt = """
# 1. Open the flagged file in src/api/ and find `use crate::core::` imports.
# 2. Remove the core/ import entirely — api/ defines abstractions, it must not know about implementations.
# 3. If api/ needs a type from core/, that type should be abstracted into a trait in api/traits.rs.
# 4. Core implementations are injected via trait objects at the saf/ layer.
# """

# [[rules]]
# id = 47
# category = "interface"
# description = "saf/ must not re-export from core/ (SAF re-exports from api/ and spi/ only)"
# severity = "error"
# type = "file_content_not_matches"
# remediation_strategy = "manual"
# path = "src/saf/mod.rs"
# pattern = "pub\\s+use\\s+crate::core"
# fix_hint = "Remove `pub use crate::core` from saf/; SAF re-exports from api/ and spi/ only — expose Core types via factory functions returning impl Trait"
# layer = ["saf", "core"]
# scope = ["package"]
# subcategory = "boundary"

# [rules.remediation]
# action = "manual"
# instruction = "For each `pub use crate::core::<Type>` line in src/saf/mod.rs: either (a) move the type to src/api/ and re-export it from there, or (b) wrap it in a saf-owned factory function returning `impl Trait`. Do not simply delete the re-export without providing a replacement — that breaks every downstream consumer."
# is_safe = false
# description = "Replace core type re-exports in saf/ with api/ re-exports or factory functions"

# # Previously imperative, downgraded to manual: the generic
# # `file_content_not_matches` remediator naked-deletes lines matching the
# # pattern. For rule 47 that means wiping `pub use crate::core::Foo` from
# # saf/mod.rs without providing a replacement factory, erasing the crate's
# # public surface and breaking every downstream consumer that imported Foo.
# # The correct fix is ARCHITECTURAL (either move the type to api/ and
# # re-export from there, or wrap it in a saf-owned factory returning
# # `impl Trait`) and requires human judgment about which path fits each
# # leaked type.

# llm_prompt = """
# For each `pub use crate::core::<Type>` line in src/saf/mod.rs:

# 1. Identify what `Type` is — a config enum? a runtime state struct? a trait
#    impl? a type alias?

# 2. Two architectural remediation paths (see rule 160 fix_options for the
#    structured form):

#    Path A — move the type to api/ (if it is public contract):
#      - Move the declaration of `Type` from src/core/<module>.rs to
#        src/api/<snake_case_type>.rs (per rule 161 — one pub item per file,
#        stem matching the snake_case name).
#      - Change src/saf/mod.rs to `pub use crate::api::<snake_case_type>::Type`
#        (this re-export is allowed — rule 47 only blocks crate::core::*).
#      - If `Type` has `impl` blocks in core/, either move them alongside the
#        api/ declaration or keep them in core/ with `impl crate::api::<...>::Type for ...`.

#    Path B — wrap in a saf factory (if the type is implementation detail):
#      - Remove the `pub use crate::core::Type` line.
#      - Leave `Type` as `pub(crate)` in core/.
#      - Add a factory function in saf/ that returns `impl SomeTrait` (where
#        SomeTrait is defined in api/): `pub fn make_foo() -> impl FooTrait { core::Type::new() }`.
#      - Consumers hold a `Box<dyn FooTrait>` / `impl FooTrait` instead of
#        the concrete core type.

# 3. Update every downstream `use crate_name::Type` site to the new location
#    (api/ path for Path A; factory call for Path B).

# 4. Run `cargo check --workspace` + `swe struct audit . --rs --checks 47` to
#    verify. Rule 47 passes when saf/mod.rs has no `pub use crate::core::...`
#    lines.

# DO NOT simply delete the `pub use` line — that breaks every downstream
# consumer. The line must be replaced by either a re-export from api/ or a
# factory function.
# """

