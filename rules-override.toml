# main.rs is the binary's entry point — it should hand off to the crate's
# real entry function as quickly as possible, not host its own logic.

# Allowed in main.rs:
#   - Crate-level attributes
#   - Doc comments
#   - extern crate, mod, pub mod, use, pub use
#   - Exactly one `fn main` (any body — but ideally minimal)

# NOT allowed:
#   - Any other fn definitions
#   - struct / enum / trait / impl / union
#   - type aliases
#   - const / static

# For each violation:
# 1. The body of `fn main` itself is fine — even if it's currently long.
#    You're allowed to keep `fn main` as-is to satisfy this rule. But
#    consider extracting its body into `saf::run()` and reducing main to:

#        fn main() { saf::run() }

#    or for binaries that return an exit code:

#        fn main() -> std::process::ExitCode { saf::run() }

#    This isolates the binary entry-point shape from the actual logic.
# 2. For OTHER items found in main.rs (helper fns, types, impls):
#    - Helper fn used only by main → move to saf/<file>.rs.
