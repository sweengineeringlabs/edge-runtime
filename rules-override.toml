# llm_prompt = """
# Test function names in tests/<file>.rs must follow a location-aware convention
# so that the name itself encodes what is being tested and at what level.

# Convention for tests/<file>.rs (flat tests):
#   <feature>_<type_kind>_<function_under_test>_<suffix>

# Convention for tests/<feature>/<file>.rs (nested tests):
#   <type_kind>_<function_under_test>_<suffix>

# Where:
#   feature    = the crate name's tail after the last hyphen
#                (e.g. 'review' from 'swe-architect-review')
#   type_kind  = one of: struct, trait, type, enum
#                (the kind of the primary item being tested)
#   function   = the function or method name being tested (snake_case)
#   suffix     = _test | _int_test | _e2e_test | _perf_test
#                (must match the file's declared test category)

# Steps to fix:
# 1. Read the violation — it names the offending test function and the
#    expected prefix (e.g. 'review' for crate 'swe-architect-review').
# 2. Identify what the test actually exercises:
#    - Which type/trait is it testing? That gives type_kind.
#    - Which function or behaviour? That gives the middle segment.
# 3. Rename the function: <feature>_<type_kind>_<fn>_<suffix>
#    Example: test_scan_secrets → review_struct_scan_secrets_int_test
# 4. If the test is in tests/<feature>/<file>.rs (nested), drop the
#    feature prefix: struct_scan_secrets_int_test
# 5. Update any #[test] references or doc links pointing to the old name.
# 6. Run `cargo test` to confirm the renamed test still passes.
# """

