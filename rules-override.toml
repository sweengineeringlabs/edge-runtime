# # =============================================================================
# # §7.1: layer_boundary (Checks 114-119, 134-137) — SEA Layer Boundary Enforcement
# #
# # The SEA pattern enforces strict layer dependencies (inward-pointing):
# #   api/     → nothing (L1: defines traits and types — the ports)
# #   core/    → api/ only (L2: internal implementations against traits)
# #   spi/     → api/ only (L2: external implementations — peer to core/)
# #   saf/     → api/, core/, spi/ (L3: composition root — wires everything)
# #   gateway/ → saf/ (L4: outermost layer — intercepts consumer calls, delegates to saf/)
# #
# # Consumer call path: Consumer → gateway/ → saf/ → core/ → api/
# #
# # Any code that bypasses this by importing from a forbidden layer is
# # constructing implementations directly instead of receiving them via DI.
# #
# # Note: Test code (#[cfg(test)] modules) is excluded — tests legitimately
# # need concrete implementations for setup. The exclude_pattern covers
# # lines containing test annotations, doc comments, and regular comments.
# # =============================================================================

