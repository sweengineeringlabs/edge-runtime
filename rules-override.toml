# # =============================================================================
# # §3.3: gateway_isolation (Checks 103-104, 131-133) — Gateway Layer Enforcement
# #
# # Gateway is the outermost layer in the SEA stack. It intercepts consumer calls
# # and delegates to saf/ (the composition root). The dependency direction is:
# #
# #   Consumer → gateway/ → saf/ → core/ → api/
# #
# # Two gateway patterns depending on crate layout:
# #   Multi-feature workspace: features/gateway/ is a standalone crate (app_type = "gateway")
# #   Binary entry point:      src/gateway/{mod.rs, ingress.rs, egress.rs} is a private module (app_type = "binary")
# #
# # When gateway/ is present in a binary crate:
# #   - main.rs (or lib.rs) declares `mod gateway;` (private, not pub)
# #   - gateway/ imports from saf/ and gets api/ types transitively
# #   - gateway/ingress/ handles inbound consumer input (CLI args, HTTP requests, etc.)
# #   - gateway/egress/ handles outbound responses (stdout, HTTP responses, file writes, etc.)
# #
# #   binary:          src/gateway/ OPTIONAL (mod gateway; — private), gate rule 131, enforced by 132-133
# #   gateway:         IS the gateway crate — no src/gateway/ module
# #   lib/*:           src/gateway/ FORBIDDEN
# # =============================================================================

