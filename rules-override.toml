# principles = ["screaming_architecture", "separation_of_concerns"]
# fix_hint = "The Default* prefix is reserved for implementation variants (DefaultFoo implements Foo). api/ is the contract layer — define the trait/type without the 'Default' prefix here and move the concrete DefaultFoo impl to src/core/."

# [rules.remediation]
# action = "manual"
# instruction = "1. If the file is named default_*.rs: git mv src/api/default_foo.rs src/core/default_foo.rs, update mod.rs declarations and use paths. 2. If a pub type/trait is named DefaultFoo: rename it to Foo (the contract name) in api/, create a separate DefaultFoo struct in src/core/ that implements the trait."
# is_safe = false
# description = "Move Default* names from api/ to core/; keep the contract trait/type in api/ under its canonical name"

# llm_prompt = """
# api/ is the contract layer — it declares what something IS, not what the default implementation IS.

# Two violation shapes:

# A. File named default_foo.rs inside api/:
#    1. git mv src/api/default_foo.rs src/core/default_foo.rs
#    2. Remove `pub mod default_foo;` from src/api/mod.rs
#    3. Add `pub(crate) mod default_foo;` to src/core/mod.rs
#    4. Update all `use crate::api::default_foo::...` paths to `use crate::core::default_foo::...`
#    5. Run `cargo check`.

# B. Type named DefaultFoo declared in api/:
#    1. Rename the type to Foo (the canonical contract name) in its api/ file.
#    2. Create src/core/default_foo.rs with `pub(crate) struct DefaultFoo` that implements `Foo`.
#    3. Register in src/core/mod.rs.
#    4. Update callsites to use the trait type (`Foo`) rather than the concrete type.
#    5. Run `cargo check`.
# """

# [[rules]]
# id = 214
# category = "naming"
# description = "core/ (L2) struct names must not end with Impl — use the Default* prefix (or Local*, Remote*, InMemory*, Noop*, <Technology>*) to name concrete implementation variants"
# severity = "warning"
# type = "builtin"
# handler = "core_no_impl_suffix"
# remediation_strategy = "manual"
# layer = ["core"]
# scope = ["package"]
# subcategory = "type_naming"
# application_type = ["lib", "binary", "shell_lib", "web"]
# principles = ["screaming_architecture", "ubiquitous_language"]
# fix_hint = "The *Impl suffix is a Java-ism that names a type for what it does (implements), not what it is. Rename FooImpl to DefaultFoo (the standard variant prefix in SEA). If there are multiple implementations use Local*, Remote*, InMemory*, Noop*, or a technology prefix (<Tech>Foo)."

# [rules.remediation]
# action = "manual"
# instruction = "1. Rename the struct: FooImpl → DefaultFoo (or the appropriate variant prefix). 2. Update the impl block: `impl Trait for FooImpl` → `impl Trait for DefaultFoo`. 3. Update all use paths and constructor callsites. 4. Rename the source file if it was named foo_impl.rs → default_foo.rs. 5. Run `cargo check`."
# is_safe = false
# description = "Rename *Impl structs to Default* (or another SEA variant prefix)"

# llm_prompt = """
# `*Impl` is a Java naming anti-pattern meaning "the thing that implements X."
# In SEA, the variant prefix encodes the deployment or behavioral variant:
#   - `Default*`   — the standard, out-of-the-box implementation
#   - `Local*`     — a local or in-process variant
#   - `Remote*`    — a networked/remote variant
#   - `InMemory*`  — an in-memory / test-double variant
#   - `Noop*`      — a do-nothing / stub variant
#   - `<Tech>*`    — a technology-specific variant (e.g. `PostgresUserStore`)

# To fix a `FooImpl` violation:
# 1. Decide which variant this is (usually `DefaultFoo`).
# 2. `sed -i 's/FooImpl/DefaultFoo/g' src/core/foo_impl.rs` (or IDE rename).
# 3. If the file is named `foo_impl.rs`, rename it to `default_foo.rs`.
# 4. Update `src/core/mod.rs`: `mod foo_impl;` → `mod default_foo;`
# 5. Update every `use crate::core::foo_impl::FooImpl` to `use crate::core::default_foo::DefaultFoo`.
# 6. Run `cargo check`.
# """