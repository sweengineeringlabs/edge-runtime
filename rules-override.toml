# is_safe = true
# description = "Define the primary trait in api/traits.rs matching service_type"

# llm_prompt = """
# 1. Read the service_type from [package.metadata.struct-engine] in Cargo.toml.
# 2. Open src/api/traits.rs (create it if it doesn't exist).
# 3. Add the matching primary trait if not present:
#    - service_type = "generator"   → `pub trait Generator { ... }`
#    - service_type = "compiler"    → `pub trait Compiler { ... }`
#    - service_type = "validator"   → `pub trait Validator { ... }`
#    - service_type = "processor"   → `pub trait Processor { ... }`
#    - service_type = "importer"    → `pub trait Importer { ... }`
#    - service_type = "exporter"    → `pub trait Exporter { ... }`
#    - service_type = "manager"     → `pub trait Manager { ... }`
#    - service_type = "registry"    → `pub trait Registry { ... }`
#    - service_type = "resolver"    → `pub trait Resolver { ... }`
#    - service_type = "provider"    → `pub trait Provider { ... }`
#    - service_type = "inspector"   → `pub trait Inspector { ... }`
#    - service_type = "monitor"     → `pub trait Monitor { ... }`
#    - service_type = "schema"      → `pub trait Generator { ... }` (schemas generate types)
#    - service_type = "orchestrator" → no primary trait required (skip)
#    - service_type = "tester"       → domain-specific lens traits (skip generic check)
# 4. Trait names MUST be nouns. They must pass the "is-a" test: "A DefaultGenerator is-a Generator."
# 5. Do not use verb names (Generate, Compile, Validate) — use the noun form (Generator, Compiler, Validator).
# """

