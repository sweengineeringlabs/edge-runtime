# # refactoring without breaking the public API.
# # =============================================================================

# [[rules]]
# id = 126
# category = "interface"
# description = "saf/ must not re-export traits via pub use — wrap trait methods as standalone functions instead"
# severity = "error"
# type = "glob_content_not_matches"
# remediation_strategy = "manual"
# glob = "src/saf/**/*.rs"
# pattern = "^\\s*pub\\s+use\\s+.*::(\\w+Runner|\\w+Scanner|\\w+Reporter|\\w+Sink|\\w+Engine)\\b|^\\s*pub\\s+use\\s+crate::api::traits::"
# exclude_pattern = "#\\[cfg\\(test\\)\\]|#\\[test\\]|///|//"
# fix_hint = "Remove `pub use` of traits from saf/; instead, add standalone pub fn wrappers that call the trait impl internally"
# layer = ["saf"]
# scope = ["package"]
# subcategory = "facade"

# [rules.remediation]
# action = "manual"
# instruction = "Remove pub use of traits from {source_dir}/{facade_layer}/ files. Instead, create standalone pub fn wrappers that call the trait impl internally. Data types (structs, enums) may still be re-exported."
# is_safe = false
# description = "Replace trait re-exports with standalone function wrappers in {facade_layer}"

# llm_prompt = """
# For each `pub use` of a trait in saf/:
# 1. Remove the `pub use crate::api::traits::TraitName;` line
# 2. Create a standalone pub fn that wraps the trait's methods:
#    ```rust
#    pub fn action_name(args) -> Result {
#        let instance: Box<dyn TraitName> = create_instance();
#        instance.method(args)
#    }
#    ```
# 3. Update all consumers to call `crate::action_name()` instead of `TraitName::method()`
# 4. The trait stays internal — consumers never see it
# 5. Data types (structs, enums) CAN still be re-exported via pub use — only traits are forbidden
# """

