# [[rules]]
# id = 162
# category = "code_organization"
# description = "lib.rs must contain only module declarations and re-exports — no struct/impl/fn/const definitions"
# severity = "warning"
# type = "builtin"
# handler = "library_entry_declarations_only"
# remediation_strategy = "manual"
# scope = ["package"]
# subcategory = "entrypoint"
# fix_hint = "lib.rs is the package access point, not a 'lost and found' for orphaned types or functions. Move pub types → api/, pub functions → saf/, implementations → core/."

# [rules.remediation]
# action = "manual"
# instruction = "For each forbidden item in lib.rs: pub struct/enum/trait → move to src/api/<snake_case>.rs (rules 160, 161); pub fn → move to src/saf/<file>.rs (factory) or src/core/<file>.rs (implementation); impl block → move alongside the struct/trait it implements; type alias → move to src/api/; const/static → move to src/core/ (or src/api/ if part of the public contract). Replace each removed item with appropriate `mod <name>;` and `pub use <name>::*;` lines if the item should still be re-exported from the crate root."
# is_safe = false
# description = "Move logic out of lib.rs into the appropriate SEA layer; lib.rs keeps only mod declarations and re-exports"

# llm_prompt = """
# lib.rs is the package's access point — it tells the world which modules
# exist and re-exports the public surface. It must not host logic.

# Allowed in lib.rs:
#   - Crate-level attributes (#![...])
#   - Doc comments (//!)
#   - extern crate declarations
#   - mod / pub mod / pub(crate) mod declarations
#   - use / pub use re-exports

# NOT allowed:
#   - fn declarations
#   - struct / enum / trait / impl / union declarations
#   - type aliases
#   - const / static definitions

# For each violation:
# 1. Identify the item (look at the violation message — it lists what was found).
# 2. Determine its proper home:
#    - Public type (struct/enum/trait/type) → api/<snake_case>.rs
#      (rules 160, 161 enforce the api/ placement and naming).
#    - Public function constructing/wiring something → saf/<file>.rs
#      (saf/ is the factory/composition layer).
#    - Internal implementation → core/<file>.rs (with pub(crate) visibility).
#    - Constants tied to behavior → core/.
#    - Constants that are public contract values → api/.
# 3. Replace the moved item in lib.rs with:
#    - `mod <new_module>;`  (and `pub mod` if it should be visible)
#    - `pub use <new_module>::*;`  if the item was re-exported.
# 4. Update use paths across the crate to point at the new location.
# 5. Move the code to the target file and keep any `pub use` re-exports in lib.rs.
# 6. Run `cargo check` and `swe struct audit . --rs --checks 162` to verify.
# """

