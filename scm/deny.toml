[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "Unicode-DFS-2016",
]
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/sweengineeringlabs/edge",
    "ssh://git@github.com/sweengineeringlabs/edge.git",
    "https://github.com/sweengineeringlabs/justobserv",
    "ssh://git@github.com/sweengineeringlabs/justobserv.git",
]
