[workspace]
resolver = "2"
members  = ["main/features/*"]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
license      = "MIT OR Apache-2.0"
rust-version = "1.95"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge"

[workspace.dependencies]
swe-edge-observ-config          = { git = "ssh://git@github.com/sweengineeringlabs/edge.git", tag = "v0.4.5" }
swe-edge-runtime-message-broker = { path = "main/features/message-broker", features = ["tokio-rt"] }
swe-edge-runtime-scheduler      = { path = "main/features/scheduler" }

[workspace.lints.rust]
unsafe_code  = "deny"
missing_docs = "warn"

[patch."ssh://git@github.com/sweengineeringlabs/edge.git"]
swe-edge-configbuilder          = { path = "../configbuilder/main/features/configbuilder" }
swe-edge-observ-config          = { path = "../observ-config/swe-edge-observ-config" }
edge-domain                     = { path = "../domain" }
edge-proxy                      = { path = "../proxy" }
swe-edge-ingress-http-transport = { path = "../ingress/http/main/features/transport" }
swe-edge-ingress-verifier       = { path = "../ingress/verifier" }
