[workspace]
resolver = "2"
members  = ["main"]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
license      = "MIT"
rust-version = "1.75"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge"

[workspace.dependencies]
serde       = { version = "1.0", features = ["derive"] }
toml        = "0.8"
dirs        = "5"
serde_json  = "1.0"
thiserror   = "2"
async-trait = "0.1"
futures     = "0.3"
tokio       = { version = "1.0", features = ["rt", "rt-multi-thread", "sync", "signal", "macros", "time", "net"] }
reqwest     = { version = "0.12", features = ["json"], default-features = false }
tracing     = "0.1"
uuid        = { version = "1.0", features = ["v4"] }
chrono      = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"

# Cross-workspace git deps — each lives in a sibling workspace root
edge-proxy                = { git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }
swe-edge-ingress          = { package = "swe-edge-ingress-gateway",       git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }
swe-edge-egress-grpc      = { package = "swe-edge-egress-grpc-transport", git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }
swe-edge-egress-http      = { package = "swe-edge-egress-http-transport", git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }
swe-edge-ingress-verifier          = { git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }
swe-edge-ingress-grpc-reflection   = { git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }
edge-domain                        = { git = "ssh://git@github.com/sweengineeringlabs/edge.git", branch = "dev" }

# Workspace-internal
swe-edge-runtime = { package = "swe-edge-runtime-main", path = "main" }

[workspace.lints.rust]
unsafe_code  = "deny"
missing_docs = "warn"
