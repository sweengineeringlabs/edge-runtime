[workspace]
resolver = "2"
members  = ["main/features/*"]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
license      = "MIT OR Apache-2.0"
rust-version = "1.95"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge"

[workspace.dependencies]
serde        = { version = "1.0", features = ["derive"] }
serde_json   = "1.0"
thiserror    = "2"
futures      = "0.3"
tokio        = { version = "1.0", features = ["rt-multi-thread", "sync", "signal", "macros", "time", "net"] }
tracing      = { version = "0.1", default-features = false }
bytes        = "1"
async-trait  = "0.1"
parking_lot  = "0.12"

[workspace.lints.rust]
unsafe_code  = "deny"
missing_docs = "warn"
