name: kafka

on:
  push:
    branches: [dev, main]
    paths:
      - 'scm/message-broker/**'
      - '.github/workflows/kafka.yml'
  pull_request:
    branches: [dev, main]
    paths:
      - 'scm/message-broker/**'
      - '.github/workflows/kafka.yml'

jobs:
  live-broker-tests:
    name: live broker tests
    runs-on: ubuntu-latest

    services:
      kafka:
        image: bitnami/kafka:3.7
        env:
          KAFKA_CFG_NODE_ID: "1"
          KAFKA_CFG_PROCESS_ROLES: broker,controller
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
          ALLOW_PLAINTEXT_LISTENER: "yes"
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-topics.sh --bootstrap-server localhost:9092 --list"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: scm/message-broker

      - name: run live-broker integration tests
        working-directory: scm/message-broker
        env:
          KAFKA_BROKERS: localhost:9092
        run: |
          cargo test --features kafka -- --include-ignored \
            --test kafka_message_broker_int_test \
            --test kafka_task_queue_int_test
