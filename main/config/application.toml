# swe-edge runtime — application configuration.
#
# Extends the shared template at C:\phd-systems\swelabs\edge\config\application.toml
# with runtime-specific defaults.

service_name          = "swe-edge"
http_bind             = "0.0.0.0:8080"
grpc_bind             = "0.0.0.0:50051"
shutdown_timeout_secs = 30
systemd_notify        = false
tenant_id             = ""    # empty = single-tenant mode
grpc_allow_unauthenticated = false
grpc_reflection            = false

[observability.tracing]
enabled = true
format  = "pretty"   # pretty | json
level   = "info"     # trace | debug | info | warn | error
# filter = ""        # optional: "my_crate=debug,tower=warn"
