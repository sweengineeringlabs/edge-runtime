# SEA project configuration (L0)
[project]
name = "swe-edge-runtime"
application_type = "lib"
workspaces = ["main/features/server", "main/features/scheduler", "main/features/message-broker"]

[whitelist]
allow = [
  ".gitignore", "bootstrap.sh", "bootstrap.ps1",
  "Cargo.lock", "Cargo.toml", "CHANGELOG.md",
  "deny.toml", "docs", "main", "README.md",
  "SECURITY.md", "target",
]
