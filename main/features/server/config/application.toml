# swe-edge runtime — operator overrides.
# Loaded via XDG chain: /etc/xdg/swe-edge/ → ~/.config/swe-edge/ → $SWE_EDGE_CONFIG_DIR
# Uncomment and set fields to override the shipped defaults.

# deploy_dir            = "/opt/my-service/deploy"   # path to deployment artifacts (systemd units, manifests, etc.)
# service_name          = "my-edge"
# http_bind             = "0.0.0.0:8080"
# grpc_bind             = "0.0.0.0:50051"
# shutdown_timeout_secs = 30
# systemd_notify        = false
# grpc_allow_unauthenticated = false
# grpc_reflection            = false   # set true to enable grpc.reflection.v1alpha

# ── Prometheus metrics endpoint ───────────────────────────────────────────────
# Absent = metrics server not started.  Bind on a separate address —
# never expose metrics on the same port as the primary HTTP ingress.
#
# [metrics]
# bind = "0.0.0.0:9090"
# path = "/metrics"

# ── Auto-scale thresholds ─────────────────────────────────────────────────────
# Checked every second by the background sampler.  When any threshold is
# exceeded a scale-out warning is emitted; the actual scaling action is
# handled by the orchestrator (Kubernetes HPA reads /metrics via Prometheus).
#
# [autoscale]
# requests_active_max   = 500
# requests_per_sec_max  = 1000
# latency_p99_ms_max    = 200

# ── HTTP TLS ─────────────────────────────────────────────────────────────────
# Absent = plain HTTP.  Set client_ca_pem_path to enable mTLS.
#
# [http_tls]
# cert_pem_path      = "/etc/edge/certs/server.crt"
# key_pem_path       = "/etc/edge/certs/server.key"
# client_ca_pem_path = "/etc/edge/certs/client-ca.crt"   # mTLS only

# ── gRPC TLS ─────────────────────────────────────────────────────────────────
#
# [grpc_tls]
# cert_pem_path      = "/etc/edge/certs/server.crt"
# key_pem_path       = "/etc/edge/certs/server.key"
# client_ca_pem_path = "/etc/edge/certs/client-ca.crt"   # mTLS only

# ── Egress HTTP client ───────────────────────────────────────────────────────
# Absent = default middleware stack with no base URL.
# Present = full middleware stack (auth, retry, rate, breaker, cache, TLS)
# using SWE defaults, applied against this base URL.
#
# [egress_http]
# base_url              = "https://upstream.example.com"
# timeout_secs          = 30
# connect_timeout_secs  = 10
# user_agent            = "my-service/1.0"
# follow_redirects      = true
# max_redirects         = 10

# ── Egress gRPC channel ───────────────────────────────────────────────────────
# Absent = no gRPC egress client wired.
#
# [egress_grpc]
# endpoint         = "https://grpc.upstream.example.com:443"
# tls_required     = true
# max_message_bytes = 4194304   # 4 MiB

# ── HTTP JWT bearer auth ──────────────────────────────────────────────────────
# Absent = no token enforcement on HTTP.
#
# HS256 (shared secret):
# [http_auth]
# required_issuer   = "https://auth.example.com"
# required_audience = "api"          # optional
# leeway_seconds    = 10
# [http_auth.key]
# algorithm = "HS256"
# secret    = [107, 101, 121]        # raw bytes of the HMAC secret
#
# RS256 / ES256 (public key):
# [http_auth]
# required_issuer   = "https://auth.example.com"
# leeway_seconds    = 10
# [http_auth.key]
# algorithm  = "RS256"
# public_pem = """
# -----BEGIN PUBLIC KEY-----
# ...
# -----END PUBLIC KEY-----
# """
